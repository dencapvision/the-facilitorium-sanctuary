name: Deploy to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Build application (local check)
      env:
        NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        npm install
        npm run build

    - name: Deploy to VPS via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22
        script: |
          cd /var/www/the-facilitorium
          git pull origin main
          npm install
          npm run build
          
          # 0. Create Runtime .env File on VPS (Safe Quotes)
          echo "Creating .env file for runtime secrets..."
          cat > .env <<EOF
          NEXT_PUBLIC_SUPABASE_URL='${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}'
          NEXT_PUBLIC_SUPABASE_ANON_KEY='${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}'
          GEMINI_API_KEY='${{ secrets.GEMINI_API_KEY }}'
          EOF

          # 1. Setup Nginx Configuration (Clean Sweep)
          echo "Configuring Nginx..."
          sudo bash -c 'cat > /etc/nginx/sites-available/facilitorium <<EOF
          server {
              listen 80;
              listen [::]:80;
              server_name facilitorium.denmasterfa.com;

              location / {
                  proxy_pass http://localhost:3000;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade \$http_upgrade;
                  proxy_set_header Connection "upgrade";
                  proxy_set_header Host \$host;
                  proxy_cache_bypass \$http_upgrade;
              }
          }
          EOF'
          
          # Force this to be the ONLY active site to resolve "Wrong Content" (MTC) issues
          echo "Enabling Facilitorium and disabling all others..."
          sudo rm -f /etc/nginx/sites-enabled/*
          sudo ln -sf /etc/nginx/sites-available/facilitorium /etc/nginx/sites-enabled/
          
          sudo nginx -t && sudo systemctl restart nginx

          # 2. Setup SSL (handled by certbot --nginx)
          echo "Checking SSL/HTTPS status..."
          if ! sudo certbot certificates | grep -q "facilitorium.denmasterfa.com"; then
            echo "Requesting new SSL certificate..."
            sudo certbot --nginx -d facilitorium.denmasterfa.com --non-interactive --agree-tos -m denmasterfa.institute@gmail.com --redirect
          else
            echo "SSL exists, forcing Nginx config update..."
            sudo certbot install --nginx -d facilitorium.denmasterfa.com --non-interactive
          fi
          
          sudo systemctl restart nginx

          # 3. Restart PM2 Application
          echo "Restarting application with PM2..."
          pm2 delete the-facilitorium || true
          pm2 start npm --name "the-facilitorium" -- start
          pm2 save
          
          echo "Deployment commands finished successfully."
