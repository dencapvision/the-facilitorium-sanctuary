name: Deploy to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Build application (local check)
      env:
        NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        npm install
        npm run build

    - name: Deploy to VPS via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22
        script: |
          cd /var/www/the-facilitorium

          # Kill any running old processes that might hold the port or files
          pm2 delete the-facilitorium || true
          
          # Clean Slate: Remove old build caches to prevent any stale Next.js data
          echo "Cleaning up old build files..."
          rm -rf node_modules
          rm -rf .next
          
          echo "Pulling latest code (Force Clean)..."
          git fetch origin
          git reset --hard origin/main
          
          echo "Installing dependencies and building..."
          npm install
          npm run build
          
          # 0. Create Runtime .env File on VPS
          echo "Creating .env file for runtime secrets..."
          cat > .env << 'EOF'
          NEXT_PUBLIC_SUPABASE_URL='${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}'
          NEXT_PUBLIC_SUPABASE_ANON_KEY='${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}'
          GEMINI_API_KEY='${{ secrets.GEMINI_API_KEY }}'
          EOF

          # 1. Setup Nginx Configuration (Clean Slate Force Rebuild)
          echo "Rebuilding Nginx configuration from SCRATCH..."
          sudo rm -f /etc/nginx/sites-available/facilitorium
          sudo rm -f /etc/nginx/sites-enabled/facilitorium

          sudo tee /etc/nginx/sites-available/facilitorium > /dev/null << 'EOF'
          server {
              listen 80;
              listen [::]:80;
              server_name facilitorium.denmasterfa.com;

              location / {
                  proxy_pass http://localhost:3002;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection "upgrade";
                  proxy_set_header Host $host;
                  proxy_cache_bypass $http_upgrade;
              }
          }
          EOF
          
          sudo ln -sf /etc/nginx/sites-available/facilitorium /etc/nginx/sites-enabled/
          
          # 2. Setup SSL / Force Injection
          echo "Scanning for existing SSL certificates..."
          if ! sudo certbot certificates | grep -q "facilitorium.denmasterfa.com"; then
            echo "Requesting new SSL certificate..."
            sudo certbot --nginx -d facilitorium.denmasterfa.com --non-interactive --agree-tos -m denmasterfa.institute@gmail.com --redirect
          else
            echo "SSL certificate found. Force Injecting into Nginx..."
            sudo certbot install --nginx -d facilitorium.denmasterfa.com --non-interactive
          fi
          
          echo "Validating Nginx config and Restarting..."
          sudo nginx -t && sudo systemctl restart nginx

          # 3. Restart PM2 Application
          echo "Starting fresh PM2 application process..."
          pm2 start "npm run start" --name "the-facilitorium"
          pm2 save
          
          echo "Deployment commands finished successfully (Clean Slate Complete)."
