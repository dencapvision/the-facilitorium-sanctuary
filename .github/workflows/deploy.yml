name: Deploy to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Build application (local check)
      env:
        NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        npm install
        npm run build

    - name: Deploy to VPS via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22
        script: |
          cd /var/www/the-facilitorium
          git pull origin main
          npm install
          npm run build
          
          # 1. Setup Nginx Configuration (only if needed)
          if [ ! -f /etc/nginx/sites-available/facilitorium ]; then
            echo "Creating Nginx configuration..."
            sudo bash -c 'cat > /etc/nginx/sites-available/facilitorium <<EOF
          server {
              listen 80;
              server_name facilitorium.denmasterfa.com;

              location / {
                  proxy_pass http://localhost:3000;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade \$http_upgrade;
                  proxy_set_header Connection "upgrade";
                  proxy_set_header Host \$host;
                  proxy_cache_bypass \$http_upgrade;
              }
          }
          EOF'
            sudo ln -s /etc/nginx/sites-available/facilitorium /etc/nginx/sites-enabled/
            sudo nginx -t && sudo systemctl reload nginx
          fi

          # 2. Setup SSL with Certbot (if not already secured)
          if ! sudo certbot certificates | grep -q "facilitorium.denmasterfa.com"; then
            echo "Installing SSL certificate..."
            sudo certbot --nginx -d facilitorium.denmasterfa.com --non-interactive --agree-tos -m your_email@example.com
          fi

          # 3. Restart PM2 Application
          pm2 restart the-facilitorium || pm2 start npm --name "the-facilitorium" -- start
